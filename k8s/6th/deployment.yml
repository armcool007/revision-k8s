apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploymentapp
spec:
  replicas: 2
  strategy: 
    type: RollingUpdate
  selector:
    matchLabels:
      app: deployapp
  template:
    metadata:
      labels:
        app: deployapp
    spec:
      containers:
        - name: deploycontainer
          image: armcool004/mavenwebapp
          ports:
            - containerPort: 8080
