apiVersion: v1
kind: Pod
metadata:
    name: webapp
    labels:
      app: webapp
spec:
  containers:
    - name: pythonapp
      image: armcool004/color_splash_from_cursorai
      ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: pythonsvc
spec:
  type: NodePort
  selector:
    app: webapp
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30171
...

