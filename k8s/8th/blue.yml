apiVersion: apps/v1
kind: Deployment
metadata:
  name: blueapp
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
     version: v1
  template:
    metadata:
      labels:
        app: webpod
        color: blue
        version: v1
    spec:
      containers:
        - name: bluecontainer
          image: armcool004/blue-test 
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
