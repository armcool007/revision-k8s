apiVersion: v1
kind: ReplicationController
metadata:
  name: rcapp
spec:
  replicas: 2
  selector:
    app: javaapp
  template:
    metadata:
      name: testcase
      labels:
        app: javaapp
    spec:
        containers:
          - name: container
            image: armcool004/spring-boot-docker-app 
            ports:
              - containerPort: 80


