---
apiVersion: v1
kind: Pod
metadata:
  name: web-log-generator
  namespace: efk
  labels:
    app: web-log-generator
spec:
  containers:
  - name: web
    image: ashokit/sb-logger-app   # ek simple web server jo har hit ka log banata hai
    ports:
    - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web-log-generator-svc
  namespace: efk
spec:
  type: NodePort
  selector:
    app: web-log-generator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 31081
...
